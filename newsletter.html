<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - FontDale Premium Mall</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== HEADER & NAVIGATION ===== -->
    <header>
        <div class="container">
            <h1><a href="index.html">FontDale</a></h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="directory.html">Directory</a>
                <a href="events.html">Events</a>
                <a href="about.html">About</a>
                <a href="newsletter.html" class="active">Newsletter</a>
            </nav>
        </div>
    </header>

    <!-- ===== PAGE TITLE ===== -->
    <div class="banner">
        <img src="assets/banner/mall-newsletter.jpg" alt="FontDale Mall" class="banner-img">
        <div class="container">
            <div class="banner-content">
                <h2>Join Our Newsletter</h2>
                <p>Stay up to date with the latest events, exclusive offers, and new store openings at FontDale.</p>
            </div>
        </div>
    </div>

    <!-- ===== NEWSLETTER FORM ===== -->
    <div class="container page-content">
        <div class="newsletter-form">
            <form id="newsletterForm">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>

                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="Enter your phone number">

                <label for="topic">Topic of Interest</label>
                <select id="topic" name="topic">
                    <option value="">Select a topic...</option>
                    <option value="fashion">Fashion</option>
                    <option value="food">Food & Beverage</option>
                    <option value="technology">Technology</option>
                    <option value="lifestyle">Lifestyle</option>
                    <option value="events">Events</option>
                </select>

                <label for="preferences">Update Preferences</label>
                <select id="preferences" name="preferences">
                    <option value="">Select frequency...</option>
                    <option value="weekly">Weekly</option>
                    <option value="bi-weekly">Bi-Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>

                <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">Subscribe</button>
            </form>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="directory.html">Directory</a>
                <a href="events.html">Events</a>
                <a href="about.html">About</a>
                <a href="newsletter.html">Newsletter</a>
            </div>
            <p>&copy; 2025 FontDale Premium Mall. All rights reserved.</p>
            <p><a href="newsletter.html">Subscribe to our Newsletter</a></p>
        </div>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script src="js/script.js"></script>
</body>
</html>
